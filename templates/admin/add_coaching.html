{% extends "base.html" %}

{% block title %}Add Coaching Service - CrickConnect{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-chalkboard-teacher text-success" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 mb-1">Add Coaching Service</h2>
                        <p class="text-muted">Create a new cricket coaching advertisement</p>
                    </div>

                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="title" class="form-label">Service Title</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="coach_name" class="form-label">Coach Name</label>
                                <input type="text" class="form-control" id="coach_name" name="coach_name" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4" 
                                      placeholder="Describe the coaching service, experience, specialties..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" name="state" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" name="city" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="area" class="form-label">Area</label>
                                <input type="text" class="form-control" id="area" name="area" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Specific Location/Venue</label>
                            <input type="text" class="form-control" id="location" name="location" 
                                   placeholder="e.g., ABC Cricket Ground, XYZ Academy">
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="price" class="form-label">Price (₹)</label>
                                <input type="number" class="form-control" id="price" name="price" min="0" step="0.01">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="discount_percentage" class="form-label">Discount (%)</label>
                                <input type="number" class="form-control" id="discount_percentage" name="discount_percentage" 
                                       min="0" max="100" value="0">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="coupon_code" class="form-label">Coupon Code</label>
                                <input type="text" class="form-control" id="coupon_code" name="coupon_code" 
                                       placeholder="e.g., CRICKET20">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="contact_phone" class="form-label">Contact Phone</label>
                                <input type="tel" class="form-control" id="contact_phone" name="contact_phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="contact_whatsapp" class="form-label">WhatsApp Number</label>
                                <input type="tel" class="form-control" id="contact_whatsapp" name="contact_whatsapp" 
                                       placeholder="Include country code (e.g., +91...)">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Back to Dashboard
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-plus me-1"></i>Add Coaching Service
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('contact_phone').addEventListener('input', function() {
    const phone = this.value;
    const whatsappField = document.getElementById('contact_whatsapp');
    if (phone && !whatsappField.value) {
        whatsappField.value = phone;
    }
});
</script>
{% endblock %}
