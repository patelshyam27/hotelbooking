{% extends "base.html" %}

{% block title %}Edit Profile - CrickConnect{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-edit text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 mb-1">Edit Your Profile</h2>
                        <p class="text-muted">Update your cricket profile information</p>
                    </div>

                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="full_name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="full_name" name="full_name" 
                                       value="{{ current_user.full_name }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" name="age" 
                                       value="{{ current_user.age if current_user.age else '' }}" min="10" max="80">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="male" {% if current_user.gender == 'male' %}selected{% endif %}>Male</option>
                                    <option value="female" {% if current_user.gender == 'female' %}selected{% endif %}>Female</option>
                                    <option value="other" {% if current_user.gender == 'other' %}selected{% endif %}>Other</option>
                                    <option value="prefer_not_to_say" {% if current_user.gender == 'prefer_not_to_say' %}selected{% endif %}>Prefer not to say</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="cricket_role" class="form-label">Cricket Role</label>
                                <select class="form-select" id="cricket_role" name="cricket_role" required>
                                    <option value="">Select Role</option>
                                    <option value="batsman" {% if current_user.cricket_role == 'batsman' %}selected{% endif %}>Batsman</option>
                                    <option value="bowler" {% if current_user.cricket_role == 'bowler' %}selected{% endif %}>Bowler</option>
                                    <option value="all-rounder" {% if current_user.cricket_role == 'all-rounder' %}selected{% endif %}>All-rounder</option>
                                    <option value="wicket-keeper" {% if current_user.cricket_role == 'wicket-keeper' %}selected{% endif %}>Wicket-keeper</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" name="state" 
                                       value="{{ current_user.state }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" name="city" 
                                       value="{{ current_user.city }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="area" class="form-label">Area</label>
                                <input type="text" class="form-control" id="area" name="area" 
                                       value="{{ current_user.area }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="availability" class="form-label">Availability</label>
                            <input type="text" class="form-control" id="availability" name="availability" 
                                   value="{{ current_user.availability if current_user.availability else '' }}"
                                   placeholder="e.g., Weekends, Evenings after 6 PM">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       value="{{ current_user.phone if current_user.phone else '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="whatsapp" class="form-label">WhatsApp Number</label>
                                <input type="tel" class="form-control" id="whatsapp" name="whatsapp" 
                                       value="{{ current_user.whatsapp if current_user.whatsapp else '' }}"
                                       placeholder="Include country code (e.g., +91...)">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea class="form-control" id="bio" name="bio" rows="4" 
                                      placeholder="Tell us about your cricket experience, achievements, or what you're looking for...">{{ current_user.bio if current_user.bio else '' }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('player_profile', user_id=current_user.id) }}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Update Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('phone').addEventListener('input', function() {
    const phone = this.value;
    const whatsappField = document.getElementById('whatsapp');
    if (phone && !whatsappField.value) {
        whatsappField.value = phone;
    }
});
</script>
{% endblock %}
