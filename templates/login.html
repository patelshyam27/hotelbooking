{% extends "base.html" %}

{% block title %}Login - CrickConnect{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-cricket-ball text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 mb-1">Welcome Back</h2>
                        <p class="text-muted">Sign in to your CrickConnect account</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                        </div>

                        <div class="text-center mt-4">
                            <p class="text-muted">
                                Don't have an account? 
                                <a href="{{ url_for('register') }}" class="text-decoration-none">Create one here</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Features reminder -->
            <div class="text-center mt-4">
                <div class="row g-3">
                    <div class="col-4">
                        <div class="text-center">
                            <i class="fas fa-users text-primary mb-2" style="font-size: 1.5rem;"></i>
                            <small class="d-block text-muted">Find Players</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="text-center">
                            <i class="fas fa-chalkboard-teacher text-primary mb-2" style="font-size: 1.5rem;"></i>
                            <small class="d-block text-muted">Get Coaching</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="text-center">
                            <i class="fas fa-video text-primary mb-2" style="font-size: 1.5rem;"></i>
                            <small class="d-block text-muted">Watch Live</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
